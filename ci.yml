name: HealthBridge AI – CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest

    - name: Run tests
      run: pytest tests/ -v --tb=short || echo "No tests yet — add tests in /tests"

    - name: Check app syntax
      run: python -c "import ast; ast.parse(open('app.py').read()); print('✅ app.py syntax OK')"
